services:
  postgres:
    image: postgres:18.3
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
        - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
